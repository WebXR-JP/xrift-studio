name: Release

# 手動実行でタグを打ち、各 OS 向けインストーラを GitHub Release に
# 添付するワークフロー（Windows / macOS / Linux 対応）。
#
# 使い方:
#   Actions タブ → "Release" → "Run workflow" で
#   タグ名 (例: v0.1.0) を入力して実行。

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'リリースタグ (例: v0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'プレリリースとして公開する'
        required: false
        type: boolean
        default: false
      draft:
        description: 'ドラフトとして公開する (手動で publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            args: ''
            rust-targets: ''
          - platform: macos-latest
            label: macOS (universal)
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux
            args: ''
            rust-targets: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: >-
          node -e 'const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const expected = "v" + config.version;
          if (process.env.RELEASE_TAG !== expected) {
            throw new Error("Release tag must match app version: " + expected);
          }'

      - name: Prepare universal macOS MCP sidecar
        if: matrix.platform == 'macos-latest'
        run: |
          pnpm mcp:sidecar:prepare:release --target aarch64-apple-darwin
          pnpm mcp:sidecar:prepare:release --target x86_64-apple-darwin
          lipo -create \
            src-tauri/binaries/xrift-studio-mcp-sidecar-aarch64-apple-darwin \
            src-tauri/binaries/xrift-studio-mcp-sidecar-x86_64-apple-darwin \
            -output src-tauri/binaries/xrift-studio-mcp-sidecar-universal-apple-darwin

      - name: Build & upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'XRift Studio ${{ inputs.tag }}'
          releaseBody: |
            ## XRift Studio ${{ inputs.tag }}

            XRift のワールドやアイテムを作り、動かし、公開する流れを
            ひとつの画面で進められる有志製デスクトップアプリです。

            ### ダウンロード

            | OS | 形式 |
            |---|---|
            | Windows | `.msi` (Windows Installer) / `.exe` (NSIS) |
            | macOS | `.dmg` (universal — Apple Silicon + Intel) |
            | Linux | `.deb` / `.rpm` / `.AppImage` |

            本アプリは XRift 公式とは無関係の有志製ツールです。
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.args }}
