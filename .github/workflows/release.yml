name: Release

# 手動実行でタグを打ち、各 OS 向けの通常版とデバッグ協力用 Debug 版を
# GitHub Release に添付するワークフロー（Windows / macOS / Linux 対応）。
#
# 使い方:
#   Actions タブ → "Release" → "Run workflow" で
#   タグ名 (例: v0.1.0) を入力して実行。

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'リリースタグ (例: v0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'プレリリースとして公開する'
        required: false
        type: boolean
        default: false
      draft:
        description: 'ドラフトとして公開する (手動で publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-e2e:
    name: Release E2E
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: >-
          node -e 'const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const expected = "v" + config.version;
          if (process.env.RELEASE_TAG !== expected) {
            throw new Error("Release tag must match app version: " + expected);
          }'

      - name: Install Chromium for release E2E
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release E2E before upload
        run: pnpm e2e:release

      - name: Upload E2E failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    needs: release-e2e

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            args: ''
            rust-targets: ''
          - platform: macos-latest
            label: macOS (universal)
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux
            args: ''
            rust-targets: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare universal macOS MCP sidecar
        if: matrix.platform == 'macos-latest'
        run: |
          pnpm mcp:sidecar:prepare:release --target aarch64-apple-darwin
          pnpm mcp:sidecar:prepare:release --target x86_64-apple-darwin
          lipo -create \
            src-tauri/binaries/xrift-studio-mcp-sidecar-aarch64-apple-darwin \
            src-tauri/binaries/xrift-studio-mcp-sidecar-x86_64-apple-darwin \
            -output src-tauri/binaries/xrift-studio-mcp-sidecar-universal-apple-darwin
          mkdir -p src-tauri/target/universal-apple-darwin/release
          lipo -create \
            src-tauri/target-mcp-sidecar/aarch64-apple-darwin/release/xrift-studio-mcp \
            src-tauri/target-mcp-sidecar/x86_64-apple-darwin/release/xrift-studio-mcp \
            -output src-tauri/target/universal-apple-darwin/release/xrift-studio-mcp

      - name: Build & upload Release and Debug bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'XRift Studio ${{ inputs.tag }}'
          releaseBody: |
            ## XRift Studio ${{ inputs.tag }}

            XRift のワールドやアイテムを作り、動かし、公開する流れを
            ひとつの画面で進められる有志製デスクトップアプリです。

            ### ダウンロード

            | OS | 形式 |
            |---|---|
            | Windows | `.msi` (Windows Installer) / `.exe` (NSIS) |
            | macOS | `.dmg` (universal — Apple Silicon + Intel) |
            | Linux | `.deb` / `.rpm` / `.AppImage` |

            各 OS について、通常利用向けの `release` 版と、初期利用者から
            不具合調査に必要な情報を得るための `debug` 版を添付しています。
            Debug 版は開発用機能を含み、サイズや動作速度も通常版と異なります。
            普段使いには `release` 版を利用し、Debug 版は不具合の再現確認や
            デバッグ協力を依頼された場合に利用してください。

            本アプリは XRift 公式とは無関係の有志製ツールです。
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          includeRelease: true
          includeDebug: true
          includeUpdaterJson: true
          assetNamePattern: '[name]_[version]_[platform]_[arch]_[mode][setup][ext]'
          args: ${{ matrix.args }}
